<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 전략 기획 Thinking Note</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --sidebar-color: #ffffff;
            --accent-color: #008485; /* 하나은행 브랜드 컬러 느낌의 딥그린 */
            --text-color: #333;
            --border-color: #ddd;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            color: var(--text-color);
            background-color: var(--bg-color);
        }

        /* 사이드바: 노트 목록 */
        #sidebar {
            width: 260px;
            background: var(--sidebar-color);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            font-weight: bold;
            font-size: 1.1rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #note-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .note-item {
            padding: 15px 20px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }

        .note-item:hover { background: #f0f7f7; }
        .note-item.active {
            background: #e6f2f2;
            border-left: 4px solid var(--accent-color);
            font-weight: 600;
        }

        /* 메인 에디터 영역 */
        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 40px;
            max-width: 900px;
            margin: 0 auto;
        }

        #note-title {
            font-size: 2rem;
            border: none;
            background: transparent;
            outline: none;
            margin-bottom: 20px;
            font-weight: bold;
            width: 100%;
        }

        #editor {
            flex: 1;
            font-size: 1.1rem;
            line-height: 1.8;
            border: none;
            outline: none;
            resize: none;
            background: transparent;
            white-space: pre-wrap;
        }

        /* 하단 툴바 */
        .toolbar {
            position: fixed;
            bottom: 20px;
            right: 40px;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 18px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: white;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        button:hover { background: #f0f0f0; }
        .btn-primary {
            background: var(--accent-color);
            color: white;
            border: none;
        }
        .btn-primary:hover { background: #006b6b; }

        .status-msg {
            font-size: 0.8rem;
            color: #888;
            margin-top: 10px;
            text-align: right;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">
        📂 Thinking Notes
        <button onclick="createNewNote()" style="padding: 2px 8px;">+</button>
    </div>
    <ul id="note-list"></ul>
</div>

<div id="main-content">
    <input type="text" id="note-title" placeholder="생각의 제목을 적어주세요..." oninput="autoSave()">
    <textarea id="editor" placeholder="여기에 자유롭게 아이디어를 끄적여보세요. (실시간 저장 중)" oninput="autoSave()"></textarea>
    <div class="status-msg" id="save-status">모든 변경사항이 저장되었습니다.</div>
</div>

<div class="toolbar">
    <button onclick="copyToClipboard()">📋 텍스트 복사</button>
    <button onclick="downloadNote()">💾 파일로 저장</button>
    <button class="btn-primary" onclick="deleteNote()">🗑️ 삭제</button>
</div>

<script>
    let notes = JSON.parse(localStorage.getItem('thinking_notes')) || [
        { id: Date.now(), title: '첫 번째 생각', content: '여기에 내용을 작성하세요.' }
    ];
    let currentNoteId = notes[0]?.id;

    function renderNoteList() {
        const listEl = document.getElementById('note-list');
        listEl.innerHTML = '';
        notes.forEach(note => {
            const li = document.createElement('li');
            li.className = `note-item ${note.id === currentNoteId ? 'active' : ''}`;
            li.innerText = note.title || '제목 없음';
            li.onclick = () => selectNote(note.id);
            listEl.appendChild(li);
        });
    }

    function selectNote(id) {
        currentNoteId = id;
        const note = notes.find(n => n.id === id);
        document.getElementById('note-title').value = note.title;
        document.getElementById('editor').value = note.content;
        renderNoteList();
    }

    function createNewNote() {
        const newNote = { id: Date.now(), title: '', content: '' };
        notes.unshift(newNote);
        selectNote(newNote.id);
    }

    function autoSave() {
        const title = document.getElementById('note-title').value;
        const content = document.getElementById('editor').value;
        const status = document.getElementById('save-status');

        const noteIndex = notes.findIndex(n => n.id === currentNoteId);
        if (noteIndex > -1) {
            notes[noteIndex].title = title;
            notes[noteIndex].content = content;
            localStorage.setItem('thinking_notes', JSON.stringify(notes));
            
            status.innerText = "저장 중...";
            setTimeout(() => { status.innerText = "모든 변경사항이 저장되었습니다."; }, 500);
        }
        renderNoteList();
    }

    function copyToClipboard() {
        const content = document.getElementById('editor').value;
        navigator.clipboard.writeText(content).then(() => alert('클립보드에 복사되었습니다!'));
    }

    function downloadNote() {
        const title = document.getElementById('note-title').value || 'untitled';
        const content = document.getElementById('editor').value;
        const blob = new Blob([content], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${title}.txt`;
        a.click();
    }

    function deleteNote() {
        if(confirm('이 노트를 삭제하시겠습니까?')) {
            notes = notes.filter(n => n.id !== currentNoteId);
            localStorage.setItem('thinking_notes', JSON.stringify(notes));
            if(notes.length > 0) selectNote(notes[0].id);
            else createNewNote();
        }
    }

    // 초기 실행
    window.onload = () => {
        if(notes.length > 0) selectNote(currentNoteId);
        else createNewNote();
    };
</script>

</body>
</html>
